name: Deploy to AWS Lambda

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: rag-text-to-sql-server
  BASE_IMAGE_REPOSITORY: lambda-python-deps
  BASE_IMAGE_TAG: 3.12
  LAMBDA_FUNCTION: rag-text-to-sql-server
  LAMBDA_ROLE_NAME: rag-lambda-execution-role

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black

      - name: Lint with ruff
        run: ruff check app lambda_handler.py

      - name: Format check with black
        run: black --check app lambda_handler.py

      - name: Verify Python imports
        run: python -m compileall app lambda_handler.py

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Lambda base image
        run: docker build --platform linux/amd64 -f Dockerfile.lambda.base -t lambda-python-deps:test .

      - name: Build Lambda application image
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg BASE_IMAGE=lambda-python-deps:test \
            -f Dockerfile.lambda \
            -t rag-lambda:test \
            .

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPIK_API_KEY: ${{ secrets.OPIK_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_ENVIRONMENT: ${{ secrets.PINECONE_ENVIRONMENT }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
          S3_CACHE_BUCKET: ${{ secrets.S3_CACHE_BUCKET }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
        run: |
          missing=()
          for var in \
            AWS_ACCESS_KEY_ID \
            AWS_SECRET_ACCESS_KEY \
            AZURE_OPENAI_API_KEY \
            AZURE_OPENAI_API_VERSION \
            AZURE_OPENAI_DEPLOYMENT_NAME \
            AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME \
            AZURE_OPENAI_ENDPOINT \
            DATABASE_URL \
            OPIK_API_KEY \
            PINECONE_API_KEY \
            PINECONE_ENVIRONMENT \
            PINECONE_INDEX_NAME \
            S3_CACHE_BUCKET \
            UPSTASH_REDIS_REST_TOKEN \
            UPSTASH_REDIS_REST_URL
          do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required GitHub Actions secrets:"
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

          echo "All required secrets are present."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "${ECR_REPOSITORY}" >/dev/null

          aws ecr describe-repositories --repository-names "${BASE_IMAGE_REPOSITORY}" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "${BASE_IMAGE_REPOSITORY}" >/dev/null

          echo "ECR repositories are ready in ${ECR_REGISTRY}."

      - name: Build and push Lambda base image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            --platform linux/amd64 \
            -f Dockerfile.lambda.base \
            -t "${ECR_REGISTRY}/${BASE_IMAGE_REPOSITORY}:${BASE_IMAGE_TAG}" \
            .

          docker push "${ECR_REGISTRY}/${BASE_IMAGE_REPOSITORY}:${BASE_IMAGE_TAG}"

      - name: Build and push Lambda application image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg BASE_IMAGE="${ECR_REGISTRY}/${BASE_IMAGE_REPOSITORY}:${BASE_IMAGE_TAG}" \
            -f Dockerfile.lambda \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest" \
            .

          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

      - name: Update Lambda function image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          ROLE_ARN="arn:aws:iam::$(aws sts get-caller-identity --query Account --output text):role/${LAMBDA_ROLE_NAME}"

          if aws lambda get-function --function-name "${LAMBDA_FUNCTION}" >/dev/null 2>&1; then
            aws lambda update-function-code \
              --function-name "${LAMBDA_FUNCTION}" \
              --image-uri "${IMAGE_URI}" \
              --architectures x86_64
          else
            aws lambda create-function \
              --function-name "${LAMBDA_FUNCTION}" \
              --package-type Image \
              --code ImageUri="${IMAGE_URI}" \
              --role "${ROLE_ARN}" \
              --architectures x86_64 \
              --timeout 900 \
              --memory-size 2048
          fi

          aws lambda wait function-active \
            --function-name "${LAMBDA_FUNCTION}"

      - name: Update Lambda environment variables
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPIK_API_KEY: ${{ secrets.OPIK_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_ENVIRONMENT: ${{ secrets.PINECONE_ENVIRONMENT }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
          S3_CACHE_BUCKET: ${{ secrets.S3_CACHE_BUCKET }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
        run: |
          aws lambda get-function-configuration \
            --function-name "${LAMBDA_FUNCTION}" \
            --query 'Environment.Variables' \
            --output json > /tmp/current-vars.json

          jq '. + {
            "APP_ENV": "production",
            "ROOT_PATH": "",
            "USE_AZURE_OPENAI": "true",
            "AZURE_OPENAI_API_KEY": env.AZURE_OPENAI_API_KEY,
            "AZURE_OPENAI_ENDPOINT": env.AZURE_OPENAI_ENDPOINT,
            "AZURE_OPENAI_DEPLOYMENT_NAME": env.AZURE_OPENAI_DEPLOYMENT_NAME,
            "AZURE_OPENAI_API_VERSION": env.AZURE_OPENAI_API_VERSION,
            "AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME": env.AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME,
            "PINECONE_API_KEY": env.PINECONE_API_KEY,
            "PINECONE_ENVIRONMENT": env.PINECONE_ENVIRONMENT,
            "PINECONE_INDEX_NAME": env.PINECONE_INDEX_NAME,
            "DATABASE_URL": env.DATABASE_URL,
            "UPSTASH_REDIS_REST_URL": env.UPSTASH_REDIS_REST_URL,
            "UPSTASH_REDIS_REST_TOKEN": env.UPSTASH_REDIS_REST_TOKEN,
            "OPIK_API_KEY": env.OPIK_API_KEY,
            "STORAGE_BACKEND": "s3",
            "S3_CACHE_BUCKET": env.S3_CACHE_BUCKET,
            "AWS_REGION": "${AWS_REGION}",
            "HOME": "/tmp",
            "TMPDIR": "/tmp",
            "TEMP": "/tmp",
            "TMP": "/tmp",
            "HF_HOME": "/tmp/.cache/huggingface",
            "TRANSFORMERS_CACHE": "/tmp/.cache/huggingface",
            "UNSTRUCTURED_CACHE_DIR": "/tmp/.cache/unstructured",
            "DOCLING_CACHE_DIR": "/tmp/.cache/docling",
            "USE_DOCKLING": "false"
          }' /tmp/current-vars.json | jq '{Variables: .}' > /tmp/env-config.json

          aws lambda update-function-configuration \
            --function-name "${LAMBDA_FUNCTION}" \
            --environment file:///tmp/env-config.json

          aws lambda wait function-updated \
            --function-name "${LAMBDA_FUNCTION}"

      - name: Ensure Lambda Function URL
        run: |
          if aws lambda get-function-url-config --function-name "${LAMBDA_FUNCTION}" >/tmp/function-url.json 2>/dev/null; then
            echo "Function URL already exists."
          else
            aws lambda create-function-url-config \
              --function-name "${LAMBDA_FUNCTION}" \
              --auth-type NONE > /tmp/function-url.json

            aws lambda add-permission \
              --function-name "${LAMBDA_FUNCTION}" \
              --statement-id FunctionURLAllowPublicAccess \
              --action lambda:InvokeFunctionUrl \
              --principal "*" \
              --function-url-auth-type NONE >/dev/null 2>&1 || true

            aws lambda add-permission \
              --function-name "${LAMBDA_FUNCTION}" \
              --statement-id FunctionURLAllowPublicInvoke \
              --action lambda:InvokeFunction \
              --principal "*" \
              --function-url-auth-type NONE >/dev/null 2>&1 || true
          fi

          PUBLIC_URL=$(jq -r '.FunctionUrl' /tmp/function-url.json)
          printf 'PUBLIC_URL=%s\n' "${PUBLIC_URL}" >> "${GITHUB_ENV}"

      - name: Smoke test deployment
        run: |
          curl --fail --silent --show-error "${PUBLIC_URL%/}/health" > /tmp/health.json
          curl --fail --silent --show-error "${PUBLIC_URL%/}/info" > /tmp/info.json

          echo "Health and info endpoints responded successfully."

      - name: Optional S3 cache verification
        if: contains(github.event.head_commit.message, '[test-s3]')
        run: |
          printf 'This is a CI cache validation document.\n' > test-s3-storage.txt

          upload_1=$(curl -sS -X POST "${PUBLIC_URL%/}/upload" -F "file=@test-s3-storage.txt")
          upload_2=$(curl -sS -X POST "${PUBLIC_URL%/}/upload" -F "file=@test-s3-storage.txt")

          echo "${upload_1}" | jq -e '.storage_backend == "s3"' >/dev/null
          echo "${upload_2}" | jq -e '.cache_hit == true' >/dev/null

          rm -f test-s3-storage.txt
