name: Test CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff black

      - name: Lint with ruff
        run: ruff check app lambda_handler.py

      - name: Format check with black
        run: black --check app lambda_handler.py

      - name: Run tests when present
        run: |
          if [ -d tests ]; then
            pytest tests/ -v
          else
            echo "No tests directory present; skipping pytest"
          fi

  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Lambda base image
        run: docker build --platform linux/amd64 -f Dockerfile.lambda.base -t lambda-python-deps:test .

      - name: Build Lambda Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg BASE_IMAGE=lambda-python-deps:test \
            -f Dockerfile.lambda \
            -t rag-lambda:test \
            .
